name: CI Pipeline

# Se ejecuta en cada push y cada pull request a main.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-scan:
    name: Build · Test · Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-app/node
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 01-app/node/package-lock.json

      - name: Instalar dependencias (npm ci)
        run: npm ci

      - name: Ejecutar pruebas
        run: npm test

      - name: Construir imagen Docker
        run: docker build -t academia-devops-app:${{ github.sha }} .

      - name: Escanear imagen con Trivy
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true        # didactico: reporta pero no rompe el pipeline
        with:
          image-ref: academia-devops-app:${{ github.sha }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
