name: CI Pipeline

# Se ejecuta en cada push y cada pull request a main.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-scan:
    name: Build · Test · Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-app/node
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 01-app/node/package-lock.json

      - name: Instalar dependencias (npm ci)
        run: npm ci

      - name: Ejecutar pruebas
        run: npm test

      - name: Construir imagen Docker
        run: docker build -t academia-devops-app:${{ github.sha }} .

      - name: Escanear imagen con Trivy
        # Instalamos Trivy y escaneamos. --exit-code 0 => reporta pero NO rompe el build (didactico).
        # En produccion usarias --exit-code 1 para BLOQUEAR si hay vulnerabilidades graves.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 academia-devops-app:${{ github.sha }}

  # Segundo job (corre en paralelo): valida la calidad del chart de Helm y del Dockerfile.
  lint:
    name: Lint · Helm · Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Helm lint (valida el chart)
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint ./06-helm/academia-app-chart

      - name: Lint del Dockerfile (hadolint)
        # --failure-threshold error: los avisos se reportan pero solo los ERRORES rompen el build.
        run: docker run --rm -i hadolint/hadolint:latest hadolint --failure-threshold error - < 01-app/node/Dockerfile
