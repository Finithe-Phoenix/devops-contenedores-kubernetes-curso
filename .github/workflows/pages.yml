name: Deploy GitHub Pages

# Publica el "Centro de Mando" (frontend estatico de 01-app/node/public) en GitHub Pages.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir el sitio (carpeta public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: 01-app/node/public

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
