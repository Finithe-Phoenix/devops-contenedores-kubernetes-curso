apiVersion: v1
kind: Service
metadata:
  name: academia-app-service
  namespace: academia
spec:
  type: ClusterIP                   # IP interna del clúster (acceso vía port-forward)
  selector:
    app: academia-app               # enruta a los Pods con esta etiqueta
  ports:
    - port: 80                      # puerto del Service
      targetPort: 8080              # puerto del contenedor
