apiVersion: v1
kind: Secret
metadata:
  name: academia-secret
  namespace: academia
type: Opaque
# ⚠️ DIDÁCTICO: usamos stringData (texto plano) para que se LEA en clase.
# Kubernetes lo codifica a base64 al guardarlo... pero base64 NO es cifrado.
# Por eso este archivo de EJEMPLO no debe contener secretos reales ni versionarse así.
# En la vida real: Sealed Secrets, External Secrets, Vault, o secretos del gestor de la nube.
stringData:
  DB_USER: academia
  DB_PASSWORD: academia
