# =====================================================================
#  COPIA DIDACTICA del pipeline (la que SE EJECUTA vive en
#  .github/workflows/ci.yml en la raiz del repo).
#  Aqui esta comentada linea por linea para explicarla en clase.
# =====================================================================
name: CI Pipeline

# 'on' = los EVENTOS que disparan el pipeline
on:
  push:
    branches: ["main"]          # cada vez que se sube codigo a main
  pull_request:
    branches: ["main"]          # y en cada propuesta de cambio (PR)

jobs:
  build-test-scan:              # un JOB = un conjunto de pasos en una maquina
    runs-on: ubuntu-latest      # el RUNNER: una VM Ubuntu efimera de GitHub
    defaults:
      run:
        working-directory: 01-app/node   # los comandos corren dentro de la app
    steps:                      # los STEPS se ejecutan en orden, de arriba a abajo
      - name: Checkout del codigo
        uses: actions/checkout@v4         # trae el repositorio al runner

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm                       # cachea node_modules entre corridas
          cache-dependency-path: 01-app/node/package-lock.json

      - name: Instalar dependencias (npm ci)
        run: npm ci                        # 'ci' = instalacion limpia y reproducible

      - name: Ejecutar pruebas
        run: npm test                      # si un test falla, el pipeline se pone ROJO

      - name: Construir imagen Docker
        run: docker build -t academia-devops-app:${{ github.sha }} .  # tag = hash del commit

      - name: Escanear imagen con Trivy
        # Instala Trivy en el runner y escanea la imagen recien construida.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 academia-devops-app:${{ github.sha }}
          # exit-code 0 => en clase reporta sin romper. En produccion: exit-code 1 para BLOQUEAR.

# Siguiente paso (CD): publicar la imagen a un registry (Docker Hub / GHCR)
# y desplegarla. Lo vemos en el dia de Kubernetes.
